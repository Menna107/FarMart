<app-navbar></app-navbar>
<router-outlet></router-outlet>
<app-footer></app-footer>

<app-toast></app-toast>

<ngx-spinner type="ball-scale-multiple" bdColor="rgba(255, 255, 255, 0.7)" [fullScreen]="true">
  <div
    class="fixed inset-0 flex flex-col items-center justify-center w-full h-full bg-white/10 backdrop-blur-md"
  >
    <div class="relative flex items-center justify-center mb-8">
      <div
        class="h-20 w-20 rounded-full border-[3px] border-brand/10 border-t-brand animate-spin"
      ></div>
      <div
        class="absolute h-12 w-12 rounded-full border-2 border-brand/5 border-b-brand/40 animate-spin"
      ></div>
    </div>

    <div class="text-center">
      <h2 class="text-gray-800 text-lg font-medium mb-1">Loading FarMart</h2>
      <p
        class="text-gray-400 text-[11px] uppercase font-semibold whitespace-nowrap tracking-[0.3em]"
      >
        Please wait a moment
      </p>
    </div>
  </div>
</ngx-spinner>
