<main class="min-h-screen pb-24">
  <!-- title -->
  <section class="bg-white pt-7">
    <div class="container px-6">
      <nav
        class="flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4"
      >
        <a routerLink="/" class="cursor-pointer hover:text-brand transition-colors">Home</a>
        <i class="fa-solid fa-chevron-right text-[7px]"></i>

        <a
          routerLink="/filteredType/categories"
          class="cursor-pointer hover:text-brand transition-colors"
          >Categories</a
        >
        <i class="fa-solid fa-chevron-right text-[7px]"></i>
        <span class="text-slate-900">sub categories</span>
      </nav>
      <h1 class="text-5xl font-black text-slate-900 tracking-tighter mb-2">
        Premium <span class="text-brand text-stroke-sm">Sub Category.</span>
      </h1>

      <p class="text-slate-400 font-medium max-w-md leading-relaxed text-lg mb-4">
        Shop from your favorite {{ categoryName }}
      </p>
    </div>
  </section>

  <section class="container px-6 mt-8">
    <!--  back to categories button -->
    <nav class="flex items-center gap-4 mb-3">
      <a
        routerLink="/filteredType/categories"
        class="flex items-center justify-center w-11 h-11 rounded-full bg-white border border-slate-200 text-slate-600 hover:text-brand hover:border-brand hover:shadow-xl hover:-translate-x-1 transition-all duration-300"
      >
        <i class="fa-solid fa-arrow-left text-sm"></i>
      </a>
      <p class="text-[13px] font-black uppercase tracking-[0.2em] text-slate-400">
        Back TO Categories
      </p>
    </nav>

    <!-- number of sub categories  -->
    <div class="flex items-center gap-3">
      <div
        class="px-5 py-2.5 bg-white border border-slate-200 rounded-2xl shadow-sm flex items-center gap-3"
      >
        <span class="relative flex h-3 w-3">
          <span
            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand opacity-75"
          ></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-brand"></span>
        </span>
        <span class="text-sm font-bold text-slate-700">
          {{ subCategoriesList.length }} Subcategories
          <span class="text-slate-400 font-medium ml-1"
            >found in <span class="text-brand">{{ categoryName }}</span></span
          >
        </span>
      </div>
    </div>

    <!-- sub categories cards -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-8 pt-12">
      @for (subCategory of subCategoriesList; track subCategory._id) {
        <div
          [routerLink]="['/products/subcategory', subCategory._id]"
          class="group bg-white border border-slate-100 rounded-[2.5rem] p-6 flex flex-col items-center hover:shadow-2xl hover:shadow-emerald-900/10 hover:-translate-y-2 transition-all duration-500 cursor-pointer"
        >
          <!-- icon -->
          <div
            class="aspect-square w-full rounded-[2.2rem] bg-slate-50 group-hover:bg-brand-light flex items-center justify-center mb-6 border border-slate-100 group-hover:border-emerald-100 transition-all duration-500"
          >
            <i
              class="fa-solid fa-folder-open text-4xl text-slate-200 group-hover:text-brand/40 group-hover:scale-110 transition-all duration-500"
            ></i>
          </div>

          <!-- name + view products button -->
          <div class="text-center">
            <h3
              class="text-base font-black text-slate-800 tracking-tight group-hover:text-brand transition-colors"
            >
              {{ subCategory.name }}
            </h3>
            <div
              class="mt-3 flex items-center justify-center gap-1.5 text-[9px] font-black uppercase tracking-[0.15em] text-slate-400 group-hover:text-brand transition-all"
            >
              <span>View Products</span>
              <i
                class="fa-solid fa-arrow-right-long text-2xs transform group-hover:translate-x-1 transition-transform"
              ></i>
            </div>
          </div>
        </div>
      }
    </div>
  </section>
</main>
