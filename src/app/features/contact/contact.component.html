<section class="container px-8 py-7 bg-main-bg min-h-screen">
  <div class="mb-12">
    <div class="flex items-center gap-3 mb-2">
      <span class="w-10 h-[2px] bg-brand"></span>
      <span class="text-brand font-bold uppercase tracking-widest text-sm">Contact Us</span>
    </div>
    <h1 class="text-4xl font-black text-text-main">
      Let's Stay <span class="text-brand">Connected</span>
    </h1>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-4 space-y-6">
      <div
        class="bg-card-bg p-8 rounded-3xl border border-brand-border shadow-sm flex items-start gap-5"
      >
        <div
          class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-brand border border-brand-border shadow-sm flex-shrink-0"
        >
          <i class="fa-solid fa-phone"></i>
        </div>
        <div>
          <h4 class="font-black text-text-main mb-1">Call Support</h4>
          <p class="text-text-muted text-sm">+1 (800) 123-4567</p>
        </div>
      </div>

      <div
        class="bg-card-bg p-8 rounded-3xl border border-brand-border shadow-sm flex items-start gap-5"
      >
        <div
          class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-brand border border-brand-border shadow-sm flex-shrink-0"
        >
          <i class="fa-solid fa-envelope"></i>
        </div>
        <div>
          <h4 class="font-black text-text-main mb-1">Email Us</h4>
          <p class="text-text-muted text-sm">support@farmart.com</p>
        </div>
      </div>

      <div
        class="bg-card-bg p-8 rounded-3xl border border-brand-border shadow-sm flex items-start gap-5"
      >
        <div
          class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-brand border border-brand-border shadow-sm flex-shrink-0"
        >
          <i class="fa-solid fa-location-dot"></i>
        </div>
        <div>
          <h4 class="font-black text-text-main mb-1">Headquarters</h4>
          <p class="text-text-muted text-sm leading-relaxed">
            Delivering happiness across
            <span class="text-brand font-bold">all Egypt governorate</span>. From Alexandria to
            Aswan!
          </p>
        </div>
      </div>
    </div>

    <div class="lg:col-span-8">
      <div
        class="bg-card-bg p-8 md:p-12 rounded-3xl border-2 border-brand-border shadow-2xl shadow-brand/5"
      >
        <form class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-black text-text-main uppercase ml-1">Full Name</label>
              <input
                type="text"
                placeholder="Enter your name"
                class="w-full bg-main-bg border border-brand-border rounded-2xl px-6 py-4 focus:outline-none focus:border-brand transition-all text-sm"
              />
            </div>
            <div class="space-y-2">
              <label class="text-xs font-black text-text-main uppercase ml-1">Email Address</label>
              <input
                type="email"
                placeholder="example@mail.com"
                class="w-full bg-main-bg border border-brand-border rounded-2xl px-6 py-4 focus:outline-none focus:border-brand transition-all text-sm"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-black text-text-main uppercase ml-1">Subject</label>
            <input
              type="text"
              placeholder="What's this about?"
              class="w-full bg-main-bg border border-brand-border rounded-2xl px-6 py-4 focus:outline-none focus:border-brand transition-all text-sm"
            />
          </div>

          <div class="space-y-2">
            <label class="text-xs font-black text-text-main uppercase ml-1">Your Message</label>
            <textarea
              rows="5"
              placeholder="Write your message..."
              class="w-full bg-main-bg border border-brand-border rounded-2xl px-6 py-4 focus:outline-none focus:border-brand transition-all text-sm resize-none"
            ></textarea>
          </div>

          <button
            type="submit"
            class="cursor-pointer w-full md:w-max px-12 h-14 bg-brand hover:bg-brandHover text-white font-black rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg shadow-brand/20 uppercase tracking-widest text-xs"
          >
            Send Message
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
