<!-- Cards -->
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
  @for (category of categoryList; track category._id) {
    <a
      [routerLink]="['/category', category._id, category.name]"
      class="group flex flex-col items-center p-6 bg-white border border-slate-100 rounded-[2.5rem] shadow-sm hover:shadow-xl hover:border-brand/20 transition-all duration-300"
    >
      <div
        class="w-24 h-24 mb-4 rounded-full bg-slate-100 overflow-hidden ring-4 ring-slate-50 group-hover:ring-brand/10 transition-all duration-300"
      >
        <img
          [src]="category.image"
          [alt]="category.name"
          class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
        />
      </div>

      <span
        class="text-xm font-bold text-text-main group-hover:text-brand transition-colors tracking-wide"
      >
        {{ category.name }}
      </span>

      <div
        [routerLink]="['/category', category._id, category.name]"
        class="hidden md:flex mt-2 items-center justify-center gap-1 text-2xs font-black uppercase tracking-widest text-slate-400 group-hover:text-brand transition-all"
      >
        <span>View Sub Categories</span>
        <i
          class="fa-solid fa-chevron-right text-[8px] transform group-hover:translate-x-1 transition-transform"
        ></i>
      </div>
    </a>
  }
</div>
