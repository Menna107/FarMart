<main
  class="min-h-screen bg-main-bg text-text-main font-sans flex items-center justify-center relative overflow-hidden"
>
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand/[0.05] rounded-full blur-[120px] pointer-events-none animate-pulse"
  ></div>

  <div class="container px-6 relative z-10">
    <div class="flex flex-col items-center">
      <div class="relative mb-0 group select-none cursor-default">
        <h1
          class="text-[14rem] md:text-[22rem] font-black leading-none tracking-[-0.05em] flex items-center justify-center"
        >
          <span
            class="inline-block transition-all duration-700 group-hover:-translate-x-12 group-hover:-rotate-12 opacity-90"
            >4</span
          >

          <div class="relative flex items-center justify-center w-[0.75em] h-[0.75em] mx-[-0.05em]">
            <span
              class="absolute inset-0 border-[2px] border-brand/20 rounded-full scale-125 group-hover:scale-150 transition-transform duration-1000"
            ></span>

            <span
              class="w-full h-full border-[18px] md:border-[28px] border-brand rounded-full shadow-[0_0_60px_rgba(var(--brand-rgb),0.2)] transition-all duration-700 group-hover:border-text-main group-hover:scale-110"
            ></span>

            <span class="absolute w-4 h-4 bg-brand rounded-full animate-ping opacity-75"></span>
          </div>

          <span
            class="inline-block transition-all duration-700 group-hover:translate-x-12 group-hover:rotate-12 opacity-90"
            >4</span
          >
        </h1>
      </div>

      <div class="text-center max-w-xl mx-auto -mt-5 relative z-20">
        <div
          class="inline-block px-4 py-1 border border-brand/20 rounded-full mb-6 bg-brand/[0.02]"
        >
          <span class="text-[10px] font-black text-brand uppercase tracking-[0.4em]">
            Error Code: 404
          </span>
        </div>

        <h2 class="text-4xl md:text-5xl font-black text-text-main mb-2 tracking-tighter uppercase">
          This path is
          <span class="relative inline-block">
            <span class="relative z-10 text-brand">empty.</span>
            <span class="absolute bottom-1 left-0 w-full h-3 bg-brand/10 -rotate-1"></span>
          </span>
        </h2>

        <p
          class="text-text-muted text-base md:text-lg mb-8 font-medium leading-relaxed opacity-70 max-w-md mx-auto"
        >
          The requested resource could not be found. It may have been permanently removed or the URL
          might be incorrect.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
          <button
            routerLink="/"
            class="group cursor-pointer w-full sm:w-auto px-12 py-5 bg-text-main text-white font-black rounded-xl hover:bg-brand transition-all active:scale-95 shadow-xl shadow-text-main/10 hover:shadow-brand/20 text-[11px] uppercase tracking-[0.2em] flex items-center justify-center gap-2"
          >
            <span>Return to Home</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 transition-transform group-hover:translate-x-1"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor font-bold"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="3"
                d="M14 5l7 7m0 0l-7 7m7-7H3"
              />
            </svg>
          </button>

          <button
            routerLink="/shop"
            class="cursor-pointer w-full sm:w-auto px-12 py-5 bg-transparent text-text-main border-2 border-slate-200 hover:border-brand/50 font-black rounded-xl transition-all active:scale-95 text-[11px] uppercase tracking-[0.2em]"
          >
            Search Products
          </button>
        </div>
      </div>
    </div>
  </div>
</main>
